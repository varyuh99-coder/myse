   HELPERS

function fmt(n){if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+"M";if(Math.abs(n)>=1e4)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});}
function calcPawIndex(pr){const v=COMPANIES.map(c=>(pr[c.ticker]||c.base)/c.base);return+(v.reduce((a,b)=>a+b,0)/v.length*1000).toFixed(2);}
function getExtremeTag(hist,cur){if(!hist||hist.length<EXTREME_DAYS)return null;const r=hist.slice(-EXTREME_DAYS);const mx=Math.max(...r),mn=Math.min(...r);if(cur>=mx)return"high";if(cur<=mn)return"low";return null;}

function pickFinNews(recent){
  const count=2+Math.floor(Math.random()*2);const rt=new Set((recent||[]).slice(-(NEWS_CD*3)).map(n=>n.s));
  let pool=FINANCIAL_NEWS.filter(n=>!rt.has(n.s));if(pool.length<6)pool=[...FINANCIAL_NEWS];
  pool.sort(()=>Math.random()-0.5);const picked=[],used=new Set();
  const ap=pool.filter(n=>n.t==="ALL");if(ap.length&&Math.random()>0.3)picked.push(ap[0]);
  for(const n of pool){if(picked.length>=count)break;if(n.t==="ALL"&&picked.some(p=>p.t==="ALL"))continue;if(n.t!=="ALL"&&used.has(n.t))continue;if(picked.includes(n))continue;used.add(n.t);picked.push(n);}
  return picked;
}
function pickNoise(recent){const c=1+Math.floor(Math.random()*2);const rt=new Set((recent||[]).slice(-8).map(n=>n.s));let p=NOISE_NEWS.filter(s=>!rt.has(s));if(p.length<3)p=[...NOISE_NEWS];p.sort(()=>Math.random()-0.5);return p.slice(0,c).map(s=>({t:"NOISE",d:0,i:0,s}));}
function pickFutNews(recent){
  const count=1+Math.floor(Math.random()*2);const rt=new Set((recent||[]).slice(-6).map(n=>n.s));
  let pool=FUTURES_NEWS.filter(n=>!rt.has(n.s));if(pool.length<4)pool=[...FUTURES_NEWS];
  pool.sort(()=>Math.random()-0.5);const picked=[],used=new Set();
  for(const n of pool){if(picked.length>=count)break;if(n.t==="FALL"&&picked.some(p=>p.t==="FALL"))continue;if(n.t!=="FALL"&&used.has(n.t))continue;if(picked.includes(n))continue;used.add(n.t);picked.push(n);}
  const fn=FUTURES_NOISE.filter(s=>!rt.has(s));if(fn.length&&Math.random()>0.5)picked.push({t:"FNOISE",d:0,i:0,s:fn[Math.floor(Math.random()*fn.length)]});
  return picked;
}

function calcStockPrices(pc,news,drifts){
  const mi=news.filter(n=>n.t==="ALL").reduce((s,n)=>s+n.i,0);const nd=[],pr={};
  COMPANIES.forEach(c=>{const prev=pc[c.ticker];let si=0;
    news.filter(n=>n.t===c.ticker).forEach(n=>{if(n.heavy){si+=n.i*DRIFT_TODAY;const dur=DRIFT_MIN+Math.floor(Math.random()*(DRIFT_MAX-DRIFT_MIN+1));nd.push({ticker:c.ticker,daysLeft:dur,dailyImpact:(n.i*(1-DRIFT_TODAY))/dur});}else si+=n.i;});
    const di=(drifts||[]).filter(d=>d.ticker===c.ticker&&d.daysLeft>0).reduce((s,d)=>s+d.dailyImpact,0);
    const deviation=(prev-c.base)/c.base;const reversion=-deviation*MEAN_REVERSION;
    const drift=(Math.random()-0.5)*c.vol*2;let ch=drift+si+(mi*c.beta)+di+reversion;ch=Math.max(-LIMIT,Math.min(LIMIT,ch));
    pr[c.ticker]=Math.max(1,+(prev*(1+ch)).toFixed(2));});
  return{prices:pr,newDrifts:nd};
}

function calcFutPrices(pc,news,pawIdx){
  const mi=news.filter(n=>n.t==="FALL").reduce((s,n)=>s+n.i,0);
  const pawDev=(pawIdx-1000)/1000;const pr={};
  FUTURES.forEach(f=>{
    if(f.ticker==="PIDX"){pr["PIDX"]=pawIdx;return;}
    const prev=pc[f.ticker]||f.base;
    const impact=news.filter(n=>n.t===f.ticker).reduce((s,n)=>s+n.i,0);
    const deviation=(prev-f.base)/f.base;const reversion=-deviation*MEAN_REVERSION;
    const seesaw=f.ticker==="LGLD"?-pawDev*SEESAW_STRENGTH*2:-pawDev*SEESAW_STRENGTH;
    const drift=(Math.random()-0.5)*f.vol*2;
    let ch=drift+impact+mi+reversion+seesaw;pr[f.ticker]=Math.max(0.01,+(prev*(1+ch)).toFixed(2));
  });return pr;
}

function posPnL(pos,curPrice){
  const r=pos.dir==="long"?(curPrice-pos.entry)/pos.entry:(pos.entry-curPrice)/pos.entry;
  const notional=pos.contractSize||(pos.margin*pos.lev);
  return+(notional*r).toFixed(2);
}
function isLiquidated(pos,curPrice){return(pos.margin+posPnL(pos,curPrice))<=pos.margin*(1-LIQ_THRESHOLD);}
function isLimitUp(p,pc){return pc>0&&p>=+(pc*(1+LIMIT)).toFixed(2);}
function isLimitDown(p,pc){return pc>0&&p<=+(pc*(1-LIMIT)).toFixed(2);}

}

      if(isLimitDown(price,pc)&&day>1){showToast("跌停，不可卖出","err");return;}

      if(q>held.available){showToast("T+1限制，仅可卖"+held.available+"股","err");return;}
      const rev=q*price,fee=+(rev*feeRate).toFixed(2),nr=rev-fee;
      const ns2=held.shares-q;const nhh={...holdings};
      if(ns2<=0)delete nhh[ticker];else nhh[ticker]={...held,shares:ns2,available:held.available-q};
      const nc=+(cash+nr).toFixed(2);setCash(nc);setHoldings(nhh);setTotalTrades(t=>t+1);setQty("");
      const pf=(price-held.avgCost)*q-fee;
      showToast("卖出 "+q+"股 · "+(pf>=0?"盈利":"亏损")+" ₥"+Math.abs(pf).toFixed(2),pf>=0?"up":"down");
      save({...getAll(),cash:nc,holdings:nhh,totalTrades:totalTrades+1});
    }
  };

  const handleOpenPos=(ticker)=>{
    const amt=parseFloat(futAmt);if(!amt||amt<=0){showToast("请输入保证金金额","err");return;}
    if(amt>cash){showToast("现金不足","err");return;}
    const entry=futPrices[ticker];if(!entry){showToast("价格异常","err");return;}
    const pos={id:Date.now(),ticker,dir:futDir,lev:futLev,margin:amt,contractSize:amt*futLev,entry,openDay:day};
    const np=[...futPositions,pos];const nc=+(cash-amt).toFixed(2);
    setCash(nc);setFutPositions(np);setFutAmt("");
    showToast((futDir==="long"?"做多":"做空")+" "+ticker+" "+futLev+"x · 保证金₥"+amt,"info");
    save({...getAll(),cash:nc,futPositions:np});
  };

  const handleClosePos=(posId)=>{
    const pos=futPositions.find(p=>p.id===posId);if(!pos)return;
    const curP=futPrices[pos.ticker]||pos.entry;
    const pnl=posPnL(pos,curP);const ret=Math.max(0,+(pos.margin+pnl).toFixed(2));
    const np=futPositions.filter(p=>p.id!==posId);const nc=+(cash+ret).toFixed(2);
    setCash(nc);setFutPositions(np);

  };

  const handleAddMargin=(posId)=>{

    const effLev=(notional/newMargin).toFixed(1);

  const resetGame=()=>{

        </div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.textSec}}>
        <span>现金 ₥{fmt(cash)}</span>
        <span>股票 ₥{fmt(holdingsValue)}</span>
        {futUnlocked&&<span style={{color:C.futures}}>期货 ₥{fmt(futValue)}</span>}

    </div>

    <div style={{padding:"6px 16px 8px",borderBottom:"1px solid "+C.border,background:"rgba(160,125,40,0.02)"}}>

      </div>
      <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:goalPct+"%",background:"linear-gradient(90deg,"+C.accent+",#c4a548)",borderRadius:2,transition:"width 0.5s"}}/></div>
      {!futUnlocked&&day<=UNLOCK_FUT_DAYS&&<div style={{fontSize:8,color:C.textSec,marginTop:3,textAlign:"right"}}>🔒 {UNLOCK_FUT_DAYS-day}天内₥200K解锁隐藏玩法</div>}
      {futUnlocked&&futDayStart>0&&(day-futDayStart)<=UNLOCK_CRYPTO_DAYS&&totalAssets<UNLOCK_CRYPTO&&<div style={{fontSize:8,color:C.futures,marginTop:3,textAlign:"right"}}>🔒 {UNLOCK_CRYPTO_DAYS-(day-futDayStart)}天内₥1M解锁隐藏玩法</div>}
    </div>

    <div style={{padding:"8px 16px",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid "+C.border,background:"rgba(160,125,40,0.04)"}}>
      <span style={{fontSize:10,color:C.accent,letterSpacing:2,fontWeight:500}}>PAW 500</span>
      <span style={{fontSize:15,fontWeight:500}}>{pawIndex.toFixed(2)}</span>
      <div style={{display:"flex",flexDirection:"column"}}>
        <span style={{fontSize:11,color:pawChange>=0?C.up:C.down,lineHeight:1.2}}>{pawChange>=0?"▲":"▼"}{Math.abs(pawChange).toFixed(2)}%</span>

    </div>

    {tab==="trade"&&<div>
      {COMPANIES.map(c=>{

              </div>
              <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:500,color:change>0?C.up:change<0?C.down:C.text}}>₥{price.toFixed(2)}</div><div style={{fontSize:10,color:change>0?C.up:change<0?C.down:C.textSec}}>{change>=0?"+":""}{change.toFixed(2)}%</div></div>
            </div>
            {held&&<div style={{marginTop:8,marginLeft:44,display:"flex",gap:12,fontSize:10,color:C.textSec,flexWrap:"wrap"}}><span>持有 <b style={{color:C.text}}>{held.shares}股</b></span><span>成本 ₥{held.avgCost.toFixed(2)}</span><span style={{color:pf>=0?C.up:C.down}}>{pf>=0?"+":""}₥{pf.toFixed(2)} ({pfp>=0?"+":""}{pfp.toFixed(1)}%)</span>{held.todayBought>0&&<span style={{color:C.accent}}>今买{held.todayBought}(T+1)</span>}</div>}
          </div>
          {isSel&&<div style={{padding:"0 16px 14px",background:C.cardAlt,borderBottom:"1px solid "+C.border}}>
            {hist.length>1&&<div style={{height:100,marginBottom:12,marginLeft:-8}}><ResponsiveContainer width="100%" height="100%"><AreaChart data={hist}><defs><linearGradient id={"g-"+c.ticker} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={change>=0?C.up:C.down} stopOpacity={0.18}/><stop offset="100%" stopColor={change>=0?C.up:C.down} stopOpacity={0.02}/></linearGradient></defs><XAxis dataKey="t" hide/><YAxis domain={["auto","auto"]} hide/><Tooltip content={<ChartTip/>}/><Area type="monotone" dataKey="p" stroke={change>=0?C.up:C.down} strokeWidth={1.5} fill={"url(#g-"+c.ticker+")"} dot={false} animationDuration={400}/></AreaChart></ResponsiveContainer></div>}

              <div style={{display:"flex",gap:6,marginTop:8}}>
                {tradeMode==="buy"?<>{[10,50,100].map(n=><button key={n} onClick={()=>setQty(String(n))} style={{flex:1,padding:"5px 0",background:"rgba(0,0,0,0.02)",border:"1px solid "+C.border,borderRadius:4,color:C.textSec,fontSize:10,cursor:"pointer",fontFamily:font,textAlign:"center"}}>{n}股</button>)}<button onClick={()=>setQty(String(Math.max(0,Math.floor(cash/(price*(1+feeRate))))))} style={{flex:1,padding:"5px 0",background:"rgba(0,0,0,0.02)",border:"1px solid "+C.border,borderRadius:4,color:C.textSec,fontSize:10,cursor:"pointer",fontFamily:font,textAlign:"center"}}>全仓</button></>
                :held&&held.available>0?<>{[{l:"1/4",v:Math.ceil(held.available/4)},{l:"1/2",v:Math.ceil(held.available/2)}].map(x=><button key={x.l} onClick={()=>setQty(String(x.v))} style={{flex:1,padding:"5px 0",background:"rgba(0,0,0,0.02)",border:"1px solid "+C.border,borderRadius:4,color:C.textSec,fontSize:10,cursor:"pointer",fontFamily:font,textAlign:"center"}}>{x.l}</button>)}<button onClick={()=>setQty(String(held.available))} style={{flex:1.2,padding:"5px 0",background:C.dangerBg,border:"1px solid rgba(192,57,43,0.25)",borderRadius:4,color:C.danger,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:font,textAlign:"center"}}>清仓</button></>
                :<span style={{fontSize:10,color:C.textSec,padding:4}}>暂无可卖</span>}
              </div>
              {qty&&parseInt(qty)>0&&<div style={{marginTop:8,padding:"8px 10px",background:C.bg,borderRadius:6,fontSize:10,color:C.textSec,lineHeight:1.8}}>
                {tradeMode==="buy"?(()=>{const q=parseInt(qty),cost=q*price,fee=+(cost*feeRate).toFixed(2),rem=cash-cost-fee,pp=totalAssets>0?(cost/totalAssets*100):0;return <><div>₥{fmt(cost)}{fee>0&&<span> +费₥{fee.toFixed(2)}</span>}</div><div style={{color:rem<0?C.up:C.text}}>余额 ₥{rem>=0?fmt(rem):"不足"}</div><div>仓位 {pp.toFixed(1)}%</div></>;})()
                :(()=>{const q=parseInt(qty),rev=q*price,fee=+(rev*feeRate).toFixed(2),p2=held?(price-held.avgCost)*q-fee:0;return <><div>收入 ₥{fmt(rev-fee)}</div>{held&&<div style={{color:p2>=0?C.up:C.down}}>{p2>=0?"盈":"亏"} ₥{Math.abs(p2).toFixed(2)}</div>}</>;})()}
              </div>}
            </div>
          </div>}
        </div>);
      })}
      <ResetButton onReset={resetGame}/>
    </div>}

    {tab==="futures"&&futUnlocked&&<div style={{padding:"0 16px"}}>
      {futPositions.length>0&&<div style={{padding:"16px 0 8px"}}>
        <div style={{fontSize:10,color:C.futures,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>持仓中</div>
        {futPositions.map(pos=>{
          const f=FUTURES.find(x=>x.ticker===pos.ticker);const curP=futPrices[pos.ticker]||pos.entry;
          const pnl=posPnL(pos,curP);const pnlPct=pos.margin>0?((pnl/pos.margin)*100):0;
          const equity=pos.margin+pnl;const dangerZone=equity<pos.margin*0.3;
          const notional=pos.contractSize||(pos.margin*pos.lev);const effLev=pos.margin>0?(notional/pos.margin):pos.lev;
          const isAdding=addMarginId===pos.id;
          return <div key={pos.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid "+(dangerZone?"rgba(192,57,43,0.3)":C.border),borderLeft:"3px solid "+(pos.dir==="long"?C.up:C.down)}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>{f?.emoji}</span>
                <div><span style={{fontWeight:500}}>{pos.ticker}</span><span style={{fontSize:10,color:pos.dir==="long"?C.up:C.down,marginLeft:6}}>{pos.dir==="long"?"做多 ▲":"做空 ▼"} {effLev.toFixed(1)}x</span></div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>{setAddMarginId(isAdding?null:pos.id);setAddMarginAmt("");}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid "+(isAdding?C.futures:C.border),background:isAdding?C.futBg:C.card,color:isAdding?C.futures:C.textSec,fontSize:10,fontFamily:font,cursor:"pointer"}}>追加</button>
                <button onClick={()=>handleClosePos(pos.id)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.card,color:C.text,fontSize:10,fontFamily:font,cursor:"pointer",fontWeight:500}}>平仓</button>

            </div>
            {dangerZone&&<div style={{marginTop:6,fontSize:10,color:C.danger,fontWeight:500}}>⚠ 接近爆仓线</div>}
            {isAdding&&<div style={{marginTop:8,padding:"10px 12px",background:C.bg,borderRadius:8,border:"1px solid "+C.border}}>

              </div>}
            </div>}

        })}
      </div>}

      <div style={{fontSize:10,color:C.futures,letterSpacing:2,textTransform:"uppercase",marginBottom:8,marginTop:futPositions.length?0:16}}>大宗商品行情</div>
      {FUTURES.map(f=>{
        const price=futPrices[f.ticker]||f.base;const pc=futPrevCloses[f.ticker]||f.base;
        const change=pc>0?((price-pc)/pc)*100:0;const isSel=futSel===f.ticker;
        const futExtremeTag=getExtremeTag(futPriceHist[f.ticker],price);
        const hist=(futPriceHist[f.ticker]||[]).map((v,i)=>({t:i+1,p:v}));
        return <div key={f.ticker}>
          <div onClick={()=>{setFutSel(isSel?null:f.ticker);setFutAmt("");setFutDir("long");setFutLev(5);}} style={{padding:"12px 0",borderBottom:"1px solid "+C.border,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{fontSize:20,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",background:C.futBg,borderRadius:8}}>{f.emoji}</div>
                <div><div style={{fontSize:13,fontWeight:500,letterSpacing:1,display:"flex",alignItems:"center",gap:4}}>{f.ticker}{futExtremeTag==="high"&&<span style={{fontSize:9}}>🚀</span>}{futExtremeTag==="low"&&<span style={{fontSize:9}}>⚓</span>}</div><div style={{fontSize:10,color:C.textSec,marginTop:1}}>{f.name}</div></div>
              </div>
              <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:500,color:change>0?C.up:change<0?C.down:C.text}}>₥{price.toFixed(2)}</div><div style={{fontSize:10,color:change>0?C.up:change<0?C.down:C.textSec}}>{change>=0?"+":""}{change.toFixed(2)}%</div></div>
            </div>
          </div>
          {isSel&&<div style={{padding:"0 0 14px",background:C.cardAlt,borderBottom:"1px solid "+C.border,borderRadius:"0 0 8px 8px",marginTop:-1,paddingTop:10}}>
            {hist.length>1&&<div style={{height:90,marginBottom:10,marginLeft:-8}}><ResponsiveContainer width="100%" height="100%"><AreaChart data={hist}><defs><linearGradient id={"gf-"+f.ticker} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={C.futures} stopOpacity={0.15}/><stop offset="100%" stopColor={C.futures} stopOpacity={0.02}/></linearGradient></defs><XAxis dataKey="t" hide/><YAxis domain={["auto","auto"]} hide/><Tooltip content={<ChartTip/>}/><Area type="monotone" dataKey="p" stroke={C.futures} strokeWidth={1.5} fill={"url(#gf-"+f.ticker+")"} dot={false}/></AreaChart></ResponsiveContainer></div>}
            <div style={{background:C.card,borderRadius:10,padding:14,border:"1px solid "+C.border,margin:"0 0px"}}>
              <div style={{display:"flex",marginBottom:10,borderRadius:6,overflow:"hidden",border:"1px solid "+C.border}}>
                <button onClick={()=>setFutDir("long")} style={{flex:1,padding:"7px 0",textAlign:"center",fontSize:11,fontWeight:500,border:"none",fontFamily:font,cursor:"pointer",background:futDir==="long"?C.upBg:"transparent",color:futDir==="long"?C.up:C.textSec}}>做多 ▲</button>
                <button onClick={()=>setFutDir("short")} style={{flex:1,padding:"7px 0",textAlign:"center",fontSize:11,fontWeight:500,border:"none",fontFamily:font,cursor:"pointer",background:futDir==="short"?C.downBg:"transparent",color:futDir==="short"?C.down:C.textSec}}>做空 ▼</button>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10}}>
                {LEVERAGES.map(l=><button key={l} onClick={()=>setFutLev(l)} style={{flex:1,padding:"6px 0",borderRadius:6,border:"1px solid "+(futLev===l?C.futures:C.border),background:futLev===l?C.futBg:"transparent",color:futLev===l?C.futures:C.textSec,fontSize:11,fontWeight:futLev===l?600:400,fontFamily:font,cursor:"pointer"}}>{l}x</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input type="number" placeholder="保证金 ₥" value={futAmt} onChange={e=>setFutAmt(e.target.value)} style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:6,padding:"8px 12px",color:C.text,fontSize:14,fontFamily:font,outline:"none"}}/>
                <button onClick={()=>handleOpenPos(f.ticker)} style={{padding:"8px 18px",borderRadius:6,border:"none",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:font,background:C.futures,color:"#fff",whiteSpace:"nowrap"}}>开仓</button>
              </div>
              <div style={{display:"flex",gap:6,marginTop:8}}>
                {[1000,5000,10000].map(a=><button key={a} onClick={()=>setFutAmt(String(a))} style={{flex:1,padding:"5px 0",background:"rgba(0,0,0,0.02)",border:"1px solid "+C.border,borderRadius:4,color:C.textSec,fontSize:10,cursor:"pointer",fontFamily:font,textAlign:"center"}}>₥{a>=1000?(a/1000)+"K":a}</button>)}
                <button onClick={()=>setFutAmt(String(Math.floor(cash)))} style={{flex:1,padding:"5px 0",background:C.dangerBg,border:"1px solid rgba(192,57,43,0.25)",borderRadius:4,color:C.danger,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:font,textAlign:"center"}}>梭哈</button>
              </div>
              {futAmt&&parseFloat(futAmt)>0&&<div style={{marginTop:8,padding:"8px 10px",background:C.bg,borderRadius:6,fontSize:10,color:C.textSec,lineHeight:1.8}}>
                <div>合约价值 ₥{fmt(parseFloat(futAmt)*futLev)}</div>
                <div>爆仓线 价格{futDir==="long"?"跌":"涨"}{(LIQ_THRESHOLD/futLev*100).toFixed(1)}%</div>
                {parseFloat(futAmt)>cash&&<div style={{color:C.danger,fontWeight:600}}>⚠ 现金不足</div>}
              </div>}
            </div>
          </div>}
        </div>;
      })}

      {futTodayNews.length>0&&<div style={{marginTop:16}}>
        <div style={{fontSize:10,color:C.futures,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>大宗简报 · Day {day}</div>
        {futTodayNews.map((n,i)=><NewsCard key={"fn-"+i} n={n} subscribed={true} isFutures/>)}
      </div>}
    </div>}

    {tab==="portfolio"&&<div style={{padding:"0 16px"}}>
      <div style={{padding:"16px 0 8px"}}>
        <div style={{fontSize:10,color:C.textSec,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>总资产走势</div>
        {assetHist.length>1?<div style={{height:120,marginLeft:-8}}><ResponsiveContainer width="100%" height="100%"><AreaChart data={assetHist.map((v,i)=>({d:i+1,v}))}><defs><linearGradient id="asset-g" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={totalAssets>=INITIAL_CASH?C.up:C.down} stopOpacity={0.15}/><stop offset="100%" stopColor={totalAssets>=INITIAL_CASH?C.up:C.down} stopOpacity={0.02}/></linearGradient></defs><XAxis dataKey="d" hide/><YAxis domain={["auto","auto"]} hide/><Tooltip content={<ChartTip/>}/><Area type="monotone" dataKey="v" stroke={totalAssets>=INITIAL_CASH?C.up:C.down} strokeWidth={1.5} fill="url(#asset-g)" dot={false}/></AreaChart></ResponsiveContainer></div>
        :<div style={{fontSize:11,color:C.textSec,padding:"20px 0",textAlign:"center"}}>交易几天后显示走势图</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        {[{l:"总资产",v:"₥"+fmt(totalAssets),c:C.text},{l:"累计收益",v:(totalAssets-INITIAL_CASH>=0?"+":"")+"₥"+fmt(totalAssets-INITIAL_CASH),c:totalAssets>=INITIAL_CASH?C.up:C.down},{l:"收益率",v:((totalAssets-INITIAL_CASH)/INITIAL_CASH*100).toFixed(2)+"%",c:totalAssets>=INITIAL_CASH?C.up:C.down},{l:"交易次数",v:totalTrades,c:C.text}].map((s,i)=>
          <div key={i} style={{background:C.card,borderRadius:8,padding:"10px 12px",border:"1px solid "+C.border}}><div style={{fontSize:9,color:C.textSec,marginBottom:4}}>{s.l}</div><div style={{fontSize:14,fontWeight:500,color:s.c}}>{s.v}</div></div>)}
      </div>
      {Object.keys(holdings).length===0&&futPositions.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:C.textSec,fontSize:12}}>空仓</div>}
      {Object.entries(holdings).map(([tk,h])=>{const c=COMPANIES.find(x=>x.ticker===tk);if(!c)return null;const p2=prices[tk]||c.base,v=h.shares*p2,pf2=(p2-h.avgCost)*h.shares,pt=totalAssets>0?(v/totalAssets*100):0;
        return <div key={tk} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid "+C.border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{c.emoji}</span><span style={{fontWeight:500}}>{tk}</span><span style={{fontSize:10,color:C.textSec}}>{c.name}</span></div><div style={{fontSize:13,fontWeight:500}}>₥{fmt(v)}</div></div>
          <div style={{display:"flex",gap:12,fontSize:10,color:C.textSec}}><span>{h.shares}股</span><span style={{color:pf2>=0?C.up:C.down,fontWeight:500}}>{pf2>=0?"+":""}₥{pf2.toFixed(2)}</span><span style={{color:C.accent}}>{pt.toFixed(1)}%</span></div>
        </div>;})}
      {futPositions.map(pos=>{const f=FUTURES.find(x=>x.ticker===pos.ticker);const curP=futPrices[pos.ticker]||pos.entry;const pnl=posPnL(pos,curP);const pNotional=pos.contractSize||(pos.margin*pos.lev);const pEffLev=pos.margin>0?(pNotional/pos.margin):pos.lev;
        return <div key={pos.id} style={{background:C.card,borderRadius:10,padding:"12px 14px",marginBottom:8,border:"1px solid "+C.border,borderLeft:"3px solid "+C.futures}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:16}}>{f?.emoji}</span><span style={{fontWeight:500}}>{pos.ticker}</span><span style={{fontSize:10,color:pos.dir==="long"?C.up:C.down}}>{pos.dir==="long"?"多":"空"} {pEffLev.toFixed(1)}x</span></div><div style={{fontSize:13,fontWeight:500,color:pnl>=0?C.up:C.down}}>{pnl>=0?"+":""}₥{pnl.toFixed(2)}</div></div>
          <div style={{fontSize:10,color:C.textSec}}>保证金 ₥{pos.margin.toFixed(0)}</div>
        </div>;})}
    </div>}

    {tab==="news"&&<div style={{padding:"0 16px"}}>
      <div style={{textAlign:"center",padding:"20px 0 12px"}}><div style={{fontSize:24}}>📰</div><div style={{fontFamily:fontTitle,fontSize:18,fontWeight:700,letterSpacing:2,marginTop:4}}>MeowAP</div><div style={{fontSize:9,color:C.textSec,letterSpacing:3,textTransform:"uppercase"}}>{isSubAct?"金融版":"综合版"}</div></div>
      {!isSubAct&&<div style={{background:"linear-gradient(135deg,#2a2520,#3d3530)",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontFamily:fontHand,fontSize:15,color:"#e8d5b0",marginBottom:4}}>升级为金融版？</div><div style={{fontSize:10,color:"rgba(200,190,170,0.6)"}}>₥{SUB_COST}/{SUB_DAYS}天</div></div><button onClick={()=>setShowSub(true)} style={{padding:"8px 16px",borderRadius:6,border:"1px solid rgba(232,213,176,0.4)",background:"transparent",color:"#e8d5b0",fontSize:11,fontFamily:font,cursor:"pointer"}}>订阅</button></div></div>}
      {isSubAct&&<div style={{background:C.cardAlt,borderRadius:8,padding:"8px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",border:"1px solid "+C.border}}><span style={{fontSize:10,color:C.accent}}>📊 金融版</span><span style={{fontSize:9,color:C.textSec}}>剩{Math.max(0,subExpiry-day)}天</span></div>}
      <div style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:500,color:C.accent,marginBottom:10}}>今日 · Day {day}</div>{displayToday.map((n,i)=><NewsCard key={"t-"+i} n={n} subscribed={isSubAct}/>)}</div>
      {displayHist.filter(n=>n.day<day).length>0&&<div><div style={{fontSize:11,color:C.textSec,marginBottom:10}}>往期</div>{[...displayHist].filter(n=>n.day<day).reverse().slice(0,30).map((n,i)=><NewsCard key={"h-"+i} n={n} subscribed={isSubAct} dim/>)}</div>}
    </div>}

    {showNext&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setShowNext(false)}><div style={{background:C.card,borderRadius:14,padding:"28px 24px",maxWidth:300,width:"85%",textAlign:"center",boxShadow:"0 12px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:32,marginBottom:8}}>🌅</div><div style={{fontFamily:fontTitle,fontSize:16,fontWeight:600,marginBottom:6}}>收盘</div><div style={{fontSize:12,color:C.textSec,lineHeight:1.7,marginBottom:18}}>结束第 {day} 个交易日？</div><div style={{display:"flex",gap:10}}><button onClick={()=>setShowNext(false)} style={{flex:1,padding:"10px 0",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textSec,fontSize:12,fontFamily:font,cursor:"pointer"}}>再看看</button><button onClick={nextDay} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontFamily:font,fontWeight:500,cursor:"pointer"}}>开盘 ▶</button></div></div></div>}

    {showSub&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setShowSub(false)}><div style={{background:C.card,borderRadius:14,padding:"28px 24px",maxWidth:300,width:"85%",textAlign:"center"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:28,marginBottom:8}}>📰</div><div style={{fontFamily:fontTitle,fontSize:16,fontWeight:600,marginBottom:12}}>金融版 · ₥{SUB_COST}/{SUB_DAYS}天</div><div style={{display:"flex",gap:10}}><button onClick={()=>setShowSub(false)} style={{flex:1,padding:"10px 0",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textSec,fontSize:12,fontFamily:font,cursor:"pointer"}}>算了</button><button onClick={handleSub} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",background:C.accent,color:"#fff",fontSize:12,fontFamily:font,fontWeight:500,cursor:"pointer"}}>订阅</button></div></div></div>}

    {futNotice&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setFutNotice(false)}><div style={{background:"linear-gradient(135deg,#2a2520,#3d3530)",borderRadius:14,padding:"32px 24px",maxWidth:300,width:"85%",textAlign:"center"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:36,marginBottom:8}}>🔓</div><div style={{fontFamily:fontTitle,fontSize:18,fontWeight:700,color:"#e8d5b0",marginBottom:8}}>期货已解锁</div><div style={{fontFamily:fontHand,fontSize:16,color:"rgba(232,213,176,0.7)",marginBottom:6}}>听说你是天才交易员？</div><div style={{fontSize:11,color:"rgba(200,190,170,0.6)",lineHeight:1.8,marginBottom:4}}>杠杆 2x / 5x / 10x · 做多做空 · 注意爆仓</div><div style={{fontSize:10,color:C.futures,marginBottom:16}}>150天内₥1M可解锁下一阶段</div><button onClick={()=>setFutNotice(false)} style={{padding:"10px 24px",borderRadius:8,border:"1px solid rgba(232,213,176,0.3)",background:"transparent",color:"#e8d5b0",fontSize:12,fontFamily:font,cursor:"pointer"}}>进入期货市场</button></div></div>}

    {cryptoNotice&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setCryptoNotice(false)}><div style={{background:"linear-gradient(135deg,#1a1a2e,#2d2248)",borderRadius:14,padding:"32px 24px",maxWidth:300,width:"85%",textAlign:"center"}} onClick={e=>e.stopPropagation()}><div style={{fontSize:36,marginBottom:8}}>🪙</div><div style={{fontFamily:fontTitle,fontSize:18,fontWeight:700,color:"#c4a548",marginBottom:8}}>币圈已解锁</div><div style={{fontFamily:fontHand,fontSize:16,color:"rgba(196,165,72,0.7)",marginBottom:16}}>欢迎来到真正的疯狂</div><div style={{fontSize:10,color:"rgba(200,190,170,0.4)",marginBottom:16}}>敬请期待下次更新</div><button onClick={()=>setCryptoNotice(false)} style={{padding:"10px 24px",borderRadius:8,border:"1px solid rgba(196,165,72,0.3)",background:"transparent",color:"#c4a548",fontSize:12,fontFamily:font,cursor:"pointer"}}>继续交易</button></div></div>}

    {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",padding:"10px 20px",borderRadius:8,fontSize:12,fontFamily:font,background:toast.type==="err"?C.downBg:toast.type==="up"?C.up:toast.type==="down"?C.down:C.card,color:toast.type==="err"?C.down:(toast.type==="up"||toast.type==="down")?"#fff":C.text,border:"1px solid "+(toast.type==="err"?C.down:toast.type==="up"?C.up:toast.type==="down"?C.down:C.border),boxShadow:"0 4px 16px rgba(0,0,0,0.1)",whiteSpace:"nowrap",maxWidth:"90vw",zIndex:200}}>{toast.msg}</div>}

    <div style={{textAlign:"center",padding:"24px 16px 0",fontFamily:fontHand,fontSize:13,color:"rgba(160,140,120,0.45)"}}>Ex Nihilo, Crescimus · MYSE Est. 0608</div>

    <style>{`input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}input[type=number]{-moz-appearance:textfield;}`}</style>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<MYSE/>);
</script>
</body>
</html>
